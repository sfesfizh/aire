# ModelConfig routes kagent requests through agentgateway instead of
# calling the Gemini API directly. Uses OpenAI provider since agentgateway
# exposes an OpenAI-compatible API; the gateway translates to Gemini
# via the AgentgatewayBackend + HTTPRoute configuration.
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: gemini-via-gateway
  namespace: kagent
spec:
  provider: OpenAI
  model: gemini-2.5-flash
  apiKeySecret: kagent-gemini
  apiKeySecretKey: GOOGLE_API_KEY
  openAI:
    baseUrl: http://agentgateway-proxy.agentgateway-system.svc:8080/v1
